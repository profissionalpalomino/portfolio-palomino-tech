<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="16" y="16" width="88" height="88" rx="22" fill="#fecdd3" filter="url(#glow)" />
  <rect x="16" y="16" width="88" height="88" rx="22" fill="#fff1f2" stroke="#fda4af" stroke-width="2" />
  <polygon points="48,39 72,39 84,60 72,81 48,81 36,60" fill="none" stroke="#e11d48" stroke-width="5" stroke-linejoin="round" />
</svg>
